<!-- Q12.The Token Manager : You are Developing a User Authentication System, and You need to Manage User Authentication Tokens. Implement a Function Named SetAuthToken that Takes an Authentication Token and Sets it in LocalStorage with an Expiration Time. -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himanshu Legendary Coder.</title>
</head>

<body>
    <script>
        function setAuthToken(token, expiresInMinutes) {
            const authData = {
                token: token,
                expiresAt: Date.now() + expiresInMinutes * 60 * 1000
            };
            localStorage.setItem("authToken", JSON.stringify(authData));
        };
        setAuthToken("abc123xyz", 30);
        console.log(JSON.parse(localStorage.getItem("authToken")));</script>
</body>

</html>
